source = ~/.config/hypr/config/variables.conf

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor = 
    path = $HOME/.cache/wallpaper/current
    color = $background
    blur_passes = 3
    blur_size = 2
    brightness = .6
}

label {
  monitor =
  text = cmd[update:1000] echo "$(~/.config/scripts/hyprlock/song_status.sh)"
  color = $fontColor
  font_size = 11
  font_family = $fontFamily
  position = 10, 520
  halign = left
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(~/.config/scripts/hyprlock/layout_status.sh)"
  color = $fontColor
  font_size = 11
  font_family = $fontFamily
  position = -170, 520
  halign = right
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(~/.config/scripts/hyprlock/network_status.sh)"
  color = $fontColor
  font_size = 14
  font_family = $fontFamily
  position = -90, 520
  halign = right
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(~/.config/scripts/hyprlock/battery_status.sh)"
  color = $fontColor
  font_size = 11
  font_family = $fontFamily
  position = -10, 520
  halign = right
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = $fontColor
  font_size = 20
  font_family = $fontBold
  position = 0, 405
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%k:%M")"
  color = $fontColor
  font_size = 93
  font_family = $fontBold
  position = 0, 310
  halign = center
  valign = center
}

label {
    monitor =
    text = Enter Password
    color = $fontColor
    font_size = 10
    font_family = $fontFamily
    position = 0, -438
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 30
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.55
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = $text
    font_family = $fontFamily
    fade_on_empty = true
    check_color = rgba(0, 0, 0, 0.4)
    fail_text = $FAIL <b>($ATTEMPTS)</b>
    position = 0, -468
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:100] echo "$(~/.config/scripts/hyprlock/lock_status.sh)"
    color = $fontColor
    font_size = 10
    font_family = $fontFamily
    position = 0, -500
    halign = center
    valign = center
}

